<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 320px;
        font-family: -apple-system, "Segoe UI", sans-serif;
        padding: 16px;
        margin: 0;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 4px;
      }
      p {
        font-size: 12px;
        color: #555;
        margin: 0 0 12px;
      }
      button {
        width: 100%;
        padding: 10px;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        background: #2563eb;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #status {
        margin-top: 12px;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .ok {
        color: #16a34a;
      }
      .err {
        color: #dc2626;
      }
    </style>
  </head>
  <body>
    <h1>샵플링 WMS 세션 연동</h1>
    <p>
      샵플링 WMS에 로그인한 상태에서, 그리고 입고 자동화 앱에도 로그인한
      상태에서 아래 버튼을 누르세요.
    </p>
    <label for="appUrl" style="font-size: 11px; color: #555">대상 앱 주소</label>
    <input
      id="appUrl"
      style="
        width: 100%;
        box-sizing: border-box;
        padding: 6px;
        margin: 2px 0 10px;
        font-size: 12px;
      "
      value="https://coupang-growth-inbound-automation.vercel.app"
    />
    <button id="send">샵플링 세션 전송</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
